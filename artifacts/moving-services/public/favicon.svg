  <circle cx="32" cy="32" r="32" fill="#0B1F3A"/>

  <!-- Truck cargo body -->
  <rect x="7" y="22" width="28" height="19" rx="2" fill="#F59E0B"/>

  <!-- Truck cab -->
  <path d="M35 27 L35 41 L57 41 L57 34 L49 24 L35 24 Z" fill="#F59E0B"/>

  <!-- Cab windshield -->
  <path d="M37.5 26.5 L48.5 26.5 L53.5 33.5 L37.5 33.5 Z" fill="#0B1F3A" opacity="0.6"/>

  <!-- Wheel left -->
